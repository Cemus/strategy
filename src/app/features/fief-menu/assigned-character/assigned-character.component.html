@if (fief && fief.type !== fiefTypeEnum.Empty) {
  <div class="flex flex-col items-center justify-center">
    <h4 class="text-lg font-semibold mb-2">Assigned Character</h4>
    <app-character-avatar [character]="fief.assigned" />
    @if (fief.assigned !== null) {
      <app-fief-actions [fief]="fief" />
    }
  </div>
}
