@if (fief?.type !== fiefTypeEnum.Empty) {
  <div class="flex flex-col items-center justify-center">
    <h3>Character</h3>
    <app-character-avatar [character]="fief?.assigned ?? null" />
    <button
      class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded cursor-pointer"
      (click)="emitDestroyFief()"
      [disabled]="!fief"
    >
      Destroy Fief
    </button>
    <p>[{{ fief?.currentAction }}ing]</p>
  </div>
}
