@if (selectedFief) {
  <div
    class="flex flex-1 gap-2 flex-col bg-slate-900 text-slate-200 p-2 justify-between"
  >
    <header class="flex items-end">
      <app-fief-icon [fief]="selectedFief" />
      <h3 class="relative top-1 text-xl font-semibold self-end place-self-end">
        {{ selectedFief.type }} ({{ selectedCity?.name }})
      </h3>
    </header>

    <div class="flex flex-1 flex-col gap-4">
      <app-assigned-character class="flex-1" [fief]="selectedFief" />

      <app-fief-upgrades [fief]="selectedFief" />
      @if (selectedFief.type !== fiefTypeEnum.Empty) {
        <button
          class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded cursor-pointer place-self-start"
          (click)="destroyFief()"
          [disabled]="!selectedFief"
        >
          Destroy Fief
        </button>
      }
    </div>
    <app-available-characters [fief]="selectedFief" />
  </div>
}
