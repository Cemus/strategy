@if (selectedFief) {
  <div
    class="flex flex-1 gap-2 flex-col bg-slate-900 text-slate-200 p-2 justify-between"
  >
    <header class="flex items-end gap-1">
      <app-fief-icon [fief]="selectedFief" />
      <h3 class="relative top-1 text-xl font-semibold self-end place-self-end">
        {{ selectedFief.type }} ({{ selectedCity?.name }})
      </h3>
    </header>

    <app-fief-menu-nav
      [currentPanel]="currentPanel"
      (changePanel)="handleChangePanel($event)"
    />

    <div class="flex flex-1 flex-col">
      @switch (currentPanel) {
        @case ("character") {
          <app-fief-menu-character [fief]="selectedFief" />
        }
        @case ("summary") {
          <app-fief-menu-summary
            [fief]="selectedFief"
            (destroyFief)="handleDestroyFief()"
          />
        }
        @case ("upgrade") {
          <app-fief-upgrades [fief]="selectedFief" />
        }

        @default {}
      }
    </div>

    <!--     <app-available-characters [fief]="selectedFief" />
 -->
  </div>
}
