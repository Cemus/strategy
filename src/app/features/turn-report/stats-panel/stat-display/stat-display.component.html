<div class="flex gap-1">
  <p>{{ statName | capitalize }}</p>
  <p>
    {{ currentValue }}
    <span
      [ngClass]="{
        'text-yellow-500': statComparison() === 'equal',
        'text-green-500': statComparison() === 'superior',
        'text-red-500': statComparison() === 'inferior',
      }"
    >
      {{ currentValue | statSign: prevValue }}
    </span>
  </p>
</div>
